# MODE SWITCHER BETWEEN "DWINDLE" & "SCROLLING"
bind = $mainMod CTRL, T, exec, ~/Scripts/Shell/Bash/cycleMode.sh

# ═══════════════════════════════════════════════════════════════
# SHARED BINDS (ALWAYS ACTIVE)
# ═══════════════════════════════════════════════════════════════

bind = $mainMod CTRL SHIFT, left, movefocus, l
bind = $mainMod CTRL SHIFT, right, movefocus, r
bind = $mainMod CTRL SHIFT, up, movefocus, u
bind = $mainMod CTRL SHIFT, down, movefocus, d

bind = $mainMod CTRL, left,  resizeactive, -20 0
bind = $mainMod CTRL, right, resizeactive,  20 0
bind = $mainMod CTRL, up,    resizeactive,  0 -20
bind = $mainMod CTRL, down,  resizeactive,  0  20

bind = $mainMod ALT, W, togglespecialworkspace
bind = $mainMod SHIFT, W, movetoworkspace, special:magic

bind = $mainMod ALT, F, fullscreen, 0
bind = $mainMod, F, fullscreen, 1

bind = ALT, Tab, cyclenext
bind = ALT SHIFT, Tab, cyclenext, prev

bind = $mainMod, D, togglefloating,
bind = $mainMod CTRL, D, pseudo,
bind = $mainMod ALT, D, layoutmsg, togglesplit

bindm = $mainMod, mouse:273, resizewindow

# ═══════════════════════════════════════════════════════════════
# LAYOUT-SPECIFIC BINDS
# ═══════════════════════════════════════════════════════════════

# Dwindle >>
#& --- Dwindle layout ---
# bind = $mainMod, left,  movewindow, l
# bind = $mainMod, right, movewindow, r
# bind = $mainMod, up,    movewindow, u
# bind = $mainMod, down,  movewindow, d
# bind = $mainMod SHIFT, right, workspace, e+1
# bind = $mainMod SHIFT, left,  workspace, e-1
# bind = $mainMod SHIFT, up,   workspace, e+1
# bind = $mainMod SHIFT, down, workspace, e-1
# bindm = $mainMod, mouse:272, movewindow
# animation = workspaces, 1, 13, easeOut, slide
# << END

# Hyprscroll >>
#& --- Hyprscroll scrolling layout ---
bind = $mainMod SHIFT, right, movefocus, r
bind = $mainMod SHIFT, left,  movefocus, l
bind = $mainMod ALT, left,  movewindow, l
bind = $mainMod ALT, right, movewindow, r
bind = $mainMod ALT, up,    movewindow, u
bind = $mainMod ALT, down,  movewindow, d
bind = $mainMod, left,  swapwindow, l
bind = $mainMod, right, swapwindow, r
bind = $mainMod, up,    swapwindow, u
bind = $mainMod, down,  swapwindow, d
bind = $mainMod SHIFT, up,   workspace, -1
bind = $mainMod SHIFT, down, workspace, +1
bind = $mainMod SHIFT ALT, up,   movetoworkspace, -1
bind = $mainMod SHIFT ALT, down, movetoworkspace, +1
bindm = $mainMod, mouse:272, movewindow
animation = workspaces, 1, 13, easeOut, slidevert
# << END

general {
    layout = scrolling
}