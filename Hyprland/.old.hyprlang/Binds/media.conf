# Audio control
bindel = $mainMod ALT, up,   exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+
bindel = $mainMod ALT, down, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = $mainMod ALT, left,  exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = $mainMod ALT, right, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ 0