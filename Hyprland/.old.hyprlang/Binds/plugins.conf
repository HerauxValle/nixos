# Switch window
bind = CTRL, SPACE, easymotion, action:hyprctl dispatch focuswindow address:{}
# Trigger overview
bind = $mainMod, TAB, hyprexpo:expo, toggle

# --- Pyprland Keybindings ---

# Scratchpad terminal (dropdown from top)
bind = $mainMod, O, exec, pypr toggle term

# System monitor (btm)
bind = $mainMod SHIFT, O, exec, pypr toggle btm

# Music player
bind = $mainMod SHIFT, M, exec, pypr toggle music

# Exposé - show all workspaces overview
bind = $mainMod, I, hyprexpo:expo, toggle

