plugin {
  dynamic-cursors {
    # Basic settings (adjust to your preference)
    
    # You can disable effects you don't like:
    # shake { enabled = false }
    # rotate { enabled = false }
    
    # Shake effect when typing/clicking
    shake {
      enabled = false
      factor = 0.5 
    }

    # Cursor rotation/tilt
    rotate {
      enabled = true
      length = 20
    }

  }
}