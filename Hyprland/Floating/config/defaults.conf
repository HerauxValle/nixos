# hyprfloat defaults config
# All values are percentages of monitor dimensions (0-100)

# Automatically enable float mode on Hyprland startup
AUTOSTART=false

# Gap from screen edges as % of monitor width/height
WINDOW_GAP_PCT=2

# Default window size when centering (% of monitor)
DEFAULT_WIDTH_PCT=60
DEFAULT_HEIGHT_PCT=60

# Maximum windows to grid -- skips the command if exceeded
MAX_GRID_WINDOWS=8

# State file location (uses /tmp by default -- no hardcoding)
STATE_FILE_DIR="/tmp"
STATE_FILE_NAME="hyprfloat_mode"
