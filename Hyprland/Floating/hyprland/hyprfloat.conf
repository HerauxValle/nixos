# hyprfloat.conf — Hyprland keybinds for hyprfloat
#
# Source this from your main hyprland.conf:
#   source = ~/.config/hypr/hyprfloat.conf
#
# Adjust $hyprfloat to wherever you placed the project.

$hyprfloat     = $HOME/Projects/FloatingWM/main.sh
$hfMod         = SUPER CTRL ALT
$hfModShift    = SUPER CTRL ALT SHIFT

# ── Autostart ────────────────────────────────────────────────────────────────
exec-once = $hyprfloat --autostart
exec      = $hyprfloat --restore

# ── Global float mode ────────────────────────────────────────────────────────
# $hfMod + F          → fill screen with gap
bind = $hfMod, F, exec, $hyprfloat --fullscreen

# $hfModShift + T     → toggle global float mode on/off
bind = $hfModShift, T, exec, $hyprfloat --toggle

# $hfModShift + E     → force enable float mode
bind = $hfModShift, E, exec, $hyprfloat --enable

# $hfModShift + D     → force disable float mode
bind = $hfModShift, D, exec, $hyprfloat --disable

# $hfMod + G          → grid all floating windows on active workspace
bind = $hfMod, G, exec, $hyprfloat --grid

# ── Directional snap (context-aware) ─────────────────────────────────────────
# Arrow keys cycle through positions based on where the window currently is.
# Examples: left+right=fullscreen, top+down=fullscreen, side+diagonal=corner
bind = $hfMod, left,  exec, $hyprfloat --dir:left
bind = $hfMod, right, exec, $hyprfloat --dir:right
bind = $hfMod, up,    exec, $hyprfloat --dir:up
bind = $hfMod, down,  exec, $hyprfloat --dir:down

# ── Center ───────────────────────────────────────────────────────────────────
# $hfMod + C          → center window on screen
bind = $hfMod, C, exec, $hyprfloat --center

# ── Gap override example ─────────────────────────────────────────────────────
# Snap with a larger gap (8% instead of default 3%):
# bind = $hfModShift, left, exec, $hyprfloat --dir:left --gap 8
