# Laptop multimedia keys for volume and LCD brightness
bindel = ,XF86AudioRaiseVolume, exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+ # Volume up (usually F3)
bindel = ,XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%- # Volume down (usually F2)
bindel = ,XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle # Mute toggle (usually F1)
bindel = ,XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle # Mic mute (usually F4)
bindel = ,XF86MonBrightnessUp, exec, brightnessctl -e4 -n2 set 5%+ # Brightness up (usually F6)
bindel = ,XF86MonBrightnessDown, exec, brightnessctl -e4 -n2 set 5%- # Brightness down (usually F5)

# Requires playerctl
bindl = , XF86AudioNext, exec, playerctl next # Next track (usually F9)
bindl = , XF86AudioPause, exec, playerctl play-pause # Pause (usually F8)
bindl = , XF86AudioPlay, exec, playerctl play-pause # Play (usually F8)
bindl = , XF86AudioPrev, exec, playerctl previous # Previous track (usually F7)