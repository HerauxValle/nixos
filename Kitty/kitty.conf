# Fonts
font_family 	 JetBrains Mono
font_size	     10
bold_font        auto
italic_font      auto
bold_italic_font auto
disable_ligatures never

symbol_map U+E0A0-U+E0A3,U+E0C0-U+E0C7 PowerlineSymbols

enable_audio_bell no

# Lets `kitty @ load-config` reload config live (used by pacnix reload) --
# scoped to processes running inside kitty's own windows, not network/system-wide.
allow_remote_control yes

# Window padding
window_padding_width 0

# Keyboard zoom
map ctrl+equal change_font_size current +2.0
map ctrl+minus change_font_size current -2.0
map ctrl+0 change_font_size current 0

# AZERTY layout alternatives
map ctrl+dollar change_font_size current +2.0
map ctrl+asterisk change_font_size current -2.0
map ctrl+exclam change_font_size current 0

# Window layout
remember_window_size  no
initial_window_width  1200
initial_window_height 750
enabled_layouts splits,stack
hide_window_decorations no

# Scrollback
scrollback_lines 5000
wheel_scroll_multiplier 3.0

# Detect URLs
detect_urls yes
open_urls_in_browser yes
url_style curly

term xterm-kitty

# tab
map alt+t new_tab_with_cwd
map alt+r close_tab

# Create windows horizontally and vertically
map ctrl+shift+s launch --location=vsplit --cwd=current
map ctrl+shift+d launch --location=hsplit --cwd=current
map ctrl+shift+q close_window

# Navigate between windows
map ctrl+shift+left neighboring_window left
map ctrl+shift+right neighboring_window right
map ctrl+shift+up neighboring_window up
map ctrl+shift+down neighboring_window down

# Resize window
map super+shift+up resize_window taller
map super+shift+down resize_window shorter
map super+shift+left resize_window narrower
map super+shift+right resize_window wider

# Layout
# Navigation between windows is now handled by cmd+arrows
# Resizing is handled by cmd+shift+arrows
map super+l next_layout

# Tabs
tab_title_max_length 24
# Kitty's default (2) hides the tab bar entirely with a single window, which
# is why the path/title (fish_title already reports it via prompt_pwd) never
# showed anywhere -- always show it, even for just one tab.
tab_bar_min_tabs 1

# Alt+f/g tab navigation
map alt+f previous_tab
map alt+g next_tab

# Startup session
startup_session ~/.config/kitty/startup.session

# Opacity
background_opacity 0.80
dynamic_background_opacity yes

# Background blur
background_blur 40

# Window border
window_border_width 1pt
draw_minimal_borders yes

# The basic colors
foreground              #f8f8f8
background              #0E1011
selection_foreground    #0E1011
selection_background    #79b8ff

# Cursor colors
cursor                  #f8f8f8
cursor_text_color       #0E1011

# URL underline color when hovering with mouse
url_color               #79b8ff

# Kitty window border colors
active_border_color     #79b8ff
inactive_border_color   #6b737c
bell_border_color       #FF9800

# OS Window titlebar colors
wayland_titlebar_color system
macos_titlebar_color system

# Tab bar colors
active_tab_foreground   #f8f8f8
active_tab_background   #383838
inactive_tab_foreground #888888
inactive_tab_background #1A1A1A
tab_bar_background      #1A1A1A

# Colors for marks (marked text in the terminal)
mark1_foreground #0E1011
mark1_background #79b8ff
mark2_foreground #0E1011
mark2_background #b392f0
mark3_foreground #0E1011
mark3_background #9db1c5

# The 16 terminal colors

# black
color0 #1A1A1A
color8 #5c5c5c

# red
color1 #f97583
color9 #FF7A84

# green
color2  #85e89d
color10 #85e89d

# yellow
color3  #ffab70
color11 #FF9800

# blue
color4  #79b8ff
color12 #b392f0

# magenta
color5  #f97583
color13 #FF7A84

# cyan
color6  #9db1c5
color14 #79b8ff

# white
color7  #bbbbbb
color15 #f8f8f8
