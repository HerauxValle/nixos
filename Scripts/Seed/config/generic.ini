#!ruleset
# generic.ini — default ruleset for .sdc SimpleDocker+ blueprint format

[meta]
name        = "sdc"
version     = "1.0"
description = "SimpleDocker+ blueprint format"
extension   = ".sdc"

[shebang]
enabled  = "true"
marker   = "#!"
default  = "sdc"
fallback = "sdc"
required = "false"

[tokens]
block_open       = "\[(.+)\]:\["
block_close      = "\]:"
block_chain      = "true"
kv               = "(.+?)\s*=\s*(.+)"
kv_sep           = "="
kv_sep_strict    = "false"
comment          = "#"
ml_comment_open  = '"""'
ml_comment_close = '"""'
list_open        = "["
list_close       = "]"
list_sep         = ","
list_trailing    = "allow"
inline_comment   = "true"

[whitespace]
indent          = "ignore"
indent_char     = "any"
trailing        = "strip"
blank_lines     = "allow"
blank_lines_max = "2"
line_ending     = "lf"

[values]
true           = "true, yes, 1, on"
false          = "false, no, 0, off"
none           = "null, none, ~, nil"
auto_int       = "true"
auto_float     = "true"
auto_bool      = "true"
auto_none      = "true"
auto_list      = "true"
string_quote   = '"'
string_escape  = "true"
env_expand     = "false"
interpolation  = "false"

[blocks]
# raw = lines passed through as-is, no kv parsing
raw        = "install, deps, services, startup"
# kv_only = only key=value lines allowed
kv_only    = "meta, env, general, config, resources, isolation, health"
case_sensitive  = "false"
unknown         = "allow"
nested          = "true"
max_depth       = "10"
duplicates      = "deny"
empty           = "allow"

[structure]
requires       = "main"
min_services   = "1"
max_services   = "0"

[validation]
unknown_key   = "warn"
missing_key   = "warn"
duplicate_key = "deny"
strict        = "false"

[encoding]
charset    = "utf-8"
bom        = "false"

[debug]
trace_tokens  = "false"
trace_tree    = "false"
trace_ruleset = "false"