# sudo broker -- auto-mode blacklist
# Commands matching any pattern here are NEVER auto-executed, even when auto
# mode is active. They fall through to the normal broker approval flow.
#
# Matching: a command is blocked if it STARTS WITH the pattern (after stripping
# leading whitespace). Patterns are case-sensitive. Lines starting with # are
# comments. Blank lines are ignored.

# ── Filesystem destruction ────────────────────────────────────────────────────
rm -rf /
rm -rf /*
rm --no-preserve-root -rf /
rm -rf --no-preserve-root /
shred
wipefs
wipe

# ── Disk / partition operations ───────────────────────────────────────────────
dd if=/dev/zero
dd if=/dev/random
dd if=/dev/urandom
mkfs
fdisk
gdisk
parted
sgdisk
sfdisk
partprobe

# ── Raw device writes ─────────────────────────────────────────────────────────
dd of=/dev/sd
dd of=/dev/nvme
dd of=/dev/hd
dd of=/dev/vd
dd of=/dev/mmcblk

# ── Critical system directory removal ────────────────────────────────────────
rm -rf /etc
rm -rf /usr
rm -rf /bin
rm -rf /sbin
rm -rf /lib
rm -rf /lib64
rm -rf /boot
rm -rf /root
rm -rf /proc
rm -rf /sys
rm -rf /dev

# ── Security & access control ─────────────────────────────────────────────────
rm /etc/sudoers
rm -f /etc/sudoers
chmod -R 777 /
chmod 777 /etc/sudoers
passwd root
chpasswd
userdel root
groupdel root
visudo

# ── Firewall nuking ───────────────────────────────────────────────────────────
iptables -F
iptables --flush
nft flush ruleset
ufw disable
firewall-cmd --panic-on

# ── Boot / init manipulation ──────────────────────────────────────────────────
systemctl disable systemd-boot
bootctl remove
grub-install
rm -rf /boot/efi
rm -rf /boot/grub

# ── Kernel / module tampering ─────────────────────────────────────────────────
rmmod
modprobe -r

# ── Fork bomb patterns ────────────────────────────────────────────────────────
:(){ :|:& };:
whoami
